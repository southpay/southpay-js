<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>@southpay/js - vanilla example</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 520px;
        margin: 48px auto;
        padding: 0 16px;
      }
      label {
        display: block;
        margin-top: 12px;
        font-size: 14px;
      }
      input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        box-sizing: border-box;
      }
      button {
        margin-top: 12px;
        padding: 8px 14px;
        border-radius: 8px;
        border: 1px solid #0f172a;
        background: #0f172a;
        color: #fff;
        cursor: pointer;
      }
      #checkout {
        margin-top: 24px;
      }
    </style>
  </head>
  <body>
    <h1>@southpay/js</h1>
    <p>Run <code>npm run build</code>, then serve the repository root over http (for example <code>npx serve . -l 8080</code>) and open <code>/examples/html/index.html</code>. This page loads <code>../../dist/index.global.js</code>, so it must be served from the repo root, not opened as a <code>file://</code> page.</p>

    <label for="key">Publishable key</label>
    <input id="key" placeholder="sp_pk_test_..." />

    <label for="api">API base (optional)</label>
    <input id="api" placeholder="https://api.southpay.io" value="http://localhost:3000" />

    <label for="origin">Checkout origin (optional)</label>
    <input id="origin" placeholder="https://pay.southpay.io" value="http://localhost:5173" />

    <button id="inline">Inline checkout</button>
    <button id="modal">Modal checkout</button>

    <div id="checkout"></div>

    <script src="../../dist/index.global.js"></script>
    <script>
      function value(id) {
        return document.getElementById(id).value.trim() || undefined;
      }

      function start(container) {
        var key = value("key");
        if (!key) {
          alert("Enter a publishable key");
          return;
        }
        var southpay = SouthPay(key, {
          apiBase: value("api"),
          checkoutOrigin: value("origin"),
        });
        southpay.paymentIntents
          .create({ amount: "10.00", currency: "EUR" })
          .then(function (intent) {
            southpay.checkout.mount({
              reference: intent.reference,
              container: container,
              onCompleted: function (event) {
                console.log("completed", event);
              },
            });
          })
          .catch(function (error) {
            console.error(error);
          });
      }

      document.getElementById("inline").addEventListener("click", function () {
        start("#checkout");
      });
      document.getElementById("modal").addEventListener("click", function () {
        start(undefined);
      });
    </script>
  </body>
</html>
